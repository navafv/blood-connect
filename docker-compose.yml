version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    # Do NOT expose port 5432 to the outside world in production!
    # The web service can still communicate with it via the internal Docker network.

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -
    ports:
      - "8000:8000"
    env_file:
      - .env.production  # Load all secrets from a file NOT committed to git
    depends_on:
      - db

volumes:
  postgres_prod_data: