version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bloodonate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: bloodonate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodonate_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate && 
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      # Map local media so uploads aren't lost if the container restarts locally
      - ./backend/media:/app/backend/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    
    # This automatically loads all variables (EMAIL, CLOUDINARY, CORS, etc.) from your .env file
    env_file: 
      - .env
      
    environment:
      # Override the DATABASE_URL to use the internal Docker network connection
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/bloodonate

volumes:
  postgres_data: