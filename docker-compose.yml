services:
  db:
    image: postgres:15-alpine
    container_name: bloodonate_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-bloodonate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bloodonate_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Use '/api' for local sharing. Django will automatically handle routing.
        # When you deploy to production, change this to: https://api.yourdomain.com/api
        VITE_API_BASE_URL: /api
    container_name: bloodonate_backend
    restart: always
    command: >
      sh -c "python manage.py migrate && 
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend/media:/app/backend/media
    env_file: 
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - bloodonate_net


networks:
  bloodonate_net:
    driver: bridge

volumes:
  postgres_data: